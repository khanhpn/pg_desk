name: Release pgdesk

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Check versions
        run: |
          node -v
          pnpm -v

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build macOS app (Apple Silicon and Intel)
        run: pnpm run release:mac

      - name: Verify macOS architecture artifacts
        run: |
          ls -la dist-release
          test -n "$(find dist-release -maxdepth 1 -name '*-mac-x64.*' -print -quit)"
          test -n "$(find dist-release -maxdepth 1 -name '*-mac-arm64.*' -print -quit)"

      - name: Inspect packaged runtime dependencies
        run: |
          APP_ASARS="$(find dist-release -path '*/PGDesk.app/Contents/Resources/app.asar' -print)"
          if [ -z "$APP_ASARS" ]; then
            echo "No app.asar files found to inspect."
            exit 0
          fi
          for APP_ASAR in $APP_ASARS; do
            echo "Checking $APP_ASAR"
            ASAR_LIST="$RUNNER_TEMP/$(basename "$(dirname "$(dirname "$(dirname "$APP_ASAR")")")")-asar-files.txt"
            if ! pnpm exec asar list "$APP_ASAR" > "$ASAR_LIST"; then
              echo "Could not inspect $APP_ASAR with asar."
              continue
            fi
            grep -E '(^|/)node_modules/(pg|pg-types|postgres-interval|xtend)/' "$ASAR_LIST" | head -80 || true
            grep -E '(^|/)node_modules/pg-types/index\.js$' "$ASAR_LIST" || echo "Warning: pg-types was not found in $APP_ASAR"
            grep -E '(^|/)node_modules/xtend/mutable\.js$' "$ASAR_LIST" || echo "Warning: xtend/mutable was not found in $APP_ASAR"
          done

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: pgdesk-macos-x64-arm64
          path: |
            dist-release/*.dmg
            dist-release/*.dmg.blockmap
            dist-release/*.zip
            dist-release/*.zip.blockmap
            dist-release/latest-mac.yml
          if-no-files-found: error

  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Check versions
        run: |
          node -v
          pnpm -v

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows app
        run: pnpm run release:win

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v5
        with:
          name: pgdesk-windows
          path: |
            dist-release/*.exe
            dist-release/*.msi
            dist-release/*.exe.blockmap
            dist-release/latest.yml
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-windows

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Show release files
        run: find release-assets -type f

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          if gh release view "$TAG_NAME" --repo "$REPO" >/dev/null 2>&1; then
            echo "Release $TAG_NAME already exists. Uploading assets..."
            gh release upload "$TAG_NAME" \
              release-assets/**/* \
              --repo "$REPO" \
              --clobber
          else
            echo "Release $TAG_NAME does not exist. Creating release..."
            gh release create "$TAG_NAME" \
              release-assets/**/* \
              --repo "$REPO" \
              --title "pgdesk $TAG_NAME" \
              --generate-notes
          fi

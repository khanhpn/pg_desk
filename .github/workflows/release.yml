name: Release pgdesk

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Check versions
        run: |
          node -v
          pnpm -v

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build macOS app
        run: pnpm exec electron-builder --mac dmg --publish never

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: pgdesk-macos
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: error

  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Check versions
        run: |
          node -v
          pnpm -v

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows app
        run: pnpm exec electron-builder --win nsis --publish never

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v5
        with:
          name: pgdesk-windows
          path: |
            dist/*.exe
            dist/*.msi
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-windows

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-assets

      - name: Show release files
        run: find release-assets -type f

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" \
            release-assets/**/* \
            --title "pgdesk $TAG_NAME" \
            --notes "Preview release of pgdesk."

name: Release pgdesk

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Check versions
        run: |
          node -v
          pnpm -v

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build macOS app
        run: pnpm run release:mac

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: pgdesk-macos
          path: |
            dist-release/*.dmg
            dist-release/*.zip
          if-no-files-found: error

  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Check versions
        run: |
          node -v
          pnpm -v

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows app
        run: pnpm run release:win

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v5
        with:
          name: pgdesk-windows
          path: |
            dist-release/*.exe
            dist-release/*.msi
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-windows

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Show release files
        run: find release-assets -type f

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          if gh release view "$TAG_NAME" --repo "$REPO" >/dev/null 2>&1; then
            echo "Release $TAG_NAME already exists. Uploading assets..."
            gh release upload "$TAG_NAME" \
              release-assets/**/* \
              --repo "$REPO" \
              --clobber
          else
            echo "Release $TAG_NAME does not exist. Creating release..."
            gh release create "$TAG_NAME" \
              release-assets/**/* \
              --repo "$REPO" \
              --title "pgdesk $TAG_NAME" \
              --notes "Preview release of pgdesk."
          fi

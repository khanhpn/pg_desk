name: PR tests

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync docs version
        run: pnpm run docs:sync-version

      - name: Verify docs version is committed
        run: git diff --exit-code -- docs/index.html docs/documentation.html

      - name: Lint
        run: pnpm run lint

      - name: Unit and component tests
        run: pnpm test

      - name: Build app
        run: pnpm run build

      - name: Electron E2E tests
        run: xvfb-run -a pnpm run test:e2e:run

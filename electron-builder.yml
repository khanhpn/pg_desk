appId: com.pgdesk.app
productName: PGDesk

directories:
  output: dist-release

files:
  - dist/**/*
  - dist-electron/**/*
  - package.json

mac:
  target:
    - dmg
    - zip
  category: public.app-category.developer-tools

win:
  target:
    - nsis

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

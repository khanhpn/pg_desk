appId: com.pgdesk.app
productName: PGDesk
compression: maximum

directories:
  output: dist-release

files:
  - dist/**/*
  - dist-electron/**/*
  - package.json
  - "!**/*.map"

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  artifactName: ${productName}-${version}-mac-${arch}.${ext}
  category: public.app-category.developer-tools

win:
  target:
    - nsis

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
